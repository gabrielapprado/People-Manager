<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-principal">
        <form>
            <div class="card">
                <h2 class="cardh2 text-center">Painel de Cadastro</h2>
                <div class="row">
                    <div class="col-6">
                        <label for="inputNome" class="form-label">Nome:</label>
                        <input class="form-control" type="text" id="inputNome">
                        <small id="erroNome" class="mensagemErro"></small>
                    </div>
                    <div class="col-6">
                        <label for="inputIdade" class="form-label">Idade:</label>
                        <input class="form-control" type="text" id="inputIdade">
                        <small id="erroIdade" class="mensagemErro"></small>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <label for="inputEmail" class="form-label">Email:</label>
                        <input class="form-control" type="text" id="inputEmail">
                        <small id="erroEmail" class="mensagemErro"></small>
                    </div>
                    <div class="col-6">
                        <label for="inputTelefone" class="form-label">Telefone:</label>
                        <input class="form-control" type="text" id="inputTelefone" pattern="\([0-9]{2}\)[\s][0-9]{5}-[0-9]{4}" placeholder="(99) 99999-9999">
                        <small id="erroTelefone" class="mensagemErro"></small>
                    </div>
                </div>
                <div class="row text-center mt-3">
                    <div class="col">
                        <button class="btn btn-primary" type="button" id="adicionarPessoa">Adicionar</button>
                    </div>
                </div>
            </div>
        </form>
        <div class="cadastrados"></div>
    </div>

    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
